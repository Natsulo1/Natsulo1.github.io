<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="destaque">
        <h1>Cadastro de Cliente</h1>
        <p>Preencha os dados abaixo para realizar seu cadastro.</p>
    </header>
    <main>
        <form class="formulario">
            <div class="secao">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" class="campo-texto" required>
            </div>
            <div class="secao">
                <label for="email">E-mail:</label>
                <input type="email" id="email" class="campo-texto" required>
            </div>
            <div class="secao">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" class="campo-texto" required>
            </div>
            <div class="secao">
                <label for="nascimento">Data de Nascimento:</label>
                <input type="date" id="nascimento" class="campo-texto">
            </div>
            <div class="secao">
                <label for="cidade">Cidade:</label>
                <select id="cidade" class="campo-texto">
                    <option>Maceió</option>
                    <option>Arapiraca</option>
                    <option>Palmeira dos Índios</option>
                    <option>Rio Largo</option>
                    <option>Marechal Deodoro</option>
                </select>
            </div>
            <div class="secao">
                <label for="observacao">Observações:</label>
                <textarea id="observacao"></textarea>
            </div>
            <div class="secao">
                <input type="checkbox" id="termos">
                <label for="termos">Aceito os termos de uso</label>
            </div>
            <button type="submit" class="botao-principal">
                Cadastrar
            </button>
        </form>
    </main>
    <footer class="rodape">
        <p>Integrantes: <a href="natsulo1.github.io">Pedro Ruan</a> e <a href="joaquim.github.io">Joaquim ferreira</a></p>
        <p>Data: 19/06/2026</p>
        <p>Disciplina: Programação Web</p>
    </footer>
</body>
</html>
